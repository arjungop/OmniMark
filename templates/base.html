<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description"
        content="AI-Powered Marketing & Sales Intelligence Platform - Automate outreach, personalize campaigns, close deals faster">
    <meta name="theme-color" content="#8B5CF6">
    <title>🎯 The OmniMark - AI Marketing Agent</title>

    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=Outfit:wght@300;400;500;600;700;800&display=swap"
        rel="stylesheet">

    <!-- Styles -->
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}?v=2.0">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/premium-ui.css') }}?v=2.0">

    <!-- Charts -->
    <script src="https://cdn.plot.ly/plotly-latest.min.js"></script>
    <script src="https://js.puter.com/v2/"></script>

    <style>
        /* Gradient Text Effect */
        .gradient-text {
            background: linear-gradient(135deg, var(--primary), var(--accent));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        /* Page Load Animation */
        @keyframes pageLoad {
            from {
                opacity: 0;
                transform: scale(0.98);
            }

            to {
                opacity: 1;
                transform: scale(1);
            }
        }

        .app-container {
            animation: pageLoad 0.4s cubic-bezier(0.4, 0, 0.2, 1);
        }
    </style>
</head>

<body>
    <!-- Toast Notification Container -->
    <div id="toast-container" class="toast-container"></div>

    <div class="app-container">
        {% block content %}{% endblock %}
    </div>

    <script src="{{ url_for('static', filename='js/script.js') }}"></script>
</body>

</html>
